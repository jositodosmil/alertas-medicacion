name: Enviar Avisos Medicacion

on:
  schedule:
    # Esto se ejecuta cada 5 minutos (formato cron)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Permite ejecutarlo a mano para probar

jobs:
  enviar_avisos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install requests pandas streamlit-gsheets pytz

      - name: Ejecutar el script de aviso
        env:
          # Aquí conectamos tus secretos de GitHub
          TOKEN_TELEGRAM: ${{ secrets.TOKEN_TELEGRAM }}
          GSHEETS_URL: ${{ secrets.GSHEETS_URL }}
        run: python bot_avisos.py
